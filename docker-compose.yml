services:
  mcp-docker-manager:
    image: ghcr.io/pushkinmazila2/docker-mcp-remout:latest
    container_name: mcp-docker-manager
    restart: unless-stopped
    
    ports:
      - "8000:8000"
    
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    
    environment:
      - MCP_AUTH_TOKEN=my0token0forever
      - SERVER_HOST=myserver
      - SERVER_PORT=8000
      - EXEC_WHITELIST=ls,ps,df,top,npm,python
    
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 256M
        reservations:
          cpus: '0.10'
          memory: 128M

    healthcheck:
      test: ["CMD", "python3", "-c", "import socket; s = socket.socket(); s.connect(('127.0.0.1', 8000))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
