services:
  # HashiCorp Vault - Secure secrets storage
  vault:
    image: hashicorp/vault:1.15
    container_name: docker-mcp-vault
    restart: unless-stopped
    ports:
      - "8200:8200"
    volumes:
      - ./vault/data:/vault/data
      - ./vault/config:/vault/config
      - ./vault/logs:/vault/logs
    environment:
      VAULT_ADDR: "http://0.0.0.0:8200"
      VAULT_API_ADDR: "http://0.0.0.0:8200"
      VAULT_DEV_ROOT_TOKEN_ID: "root-token-change-me"  # !! Change in production !!
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    cap_add:
      - IPC_LOCK
    command: server -dev
    healthcheck:
      test: ["CMD", "vault", "status"]
      interval: 10s
      timeout: 5s
      retries: 3

  mcp-hub:
    build: .
    image: docker-mcp-hub:latest
    container_name: docker-mcp-hub
    restart: unless-stopped
    depends_on:
      vault:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data        # servers.json (fallback)
      - ./keys:/keys        # SSH ключи
    environment:
            DATA_DIR: /data
      KEYS_DIR: /keys
      
      # Vault Configuration - HashiCorp Vault by default
      # Токены будут автоматически сгенерированы и сохранены в Vault
      # Можно задать через переменные окружения для первого запуска:
      # MCP_USER_TOKEN: "your-custom-user-token"
      # MCP_ADMIN_TOKEN: "your-custom-admin-token"
      # WEB_UI_TOKEN: "your-custom-webui-token"
      
      VAULT_TYPE: "hashicorp"  # Используется по умолчанию
      VAULT_ADDR: "http://vault:8200"
      VAULT_TOKEN: "root-token-change-me"  # !! Change in production !!
      VAULT_SECRET_PATH: "secret/data/docker-mcp-hub"
      
      # To use Local File Storage instead, set:
      # VAULT_TYPE: "local"
      
      # To use AWS Secrets Manager instead, set:
      # VAULT_TYPE: "aws"
      # AWS_SECRET_NAME: "docker-mcp-hub/master-keys"
      # AWS_REGION: "us-east-1"
      # AWS_ACCESS_KEY_ID: "your-access-key"
      # AWS_SECRET_ACCESS_KEY: "your-secret-key"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3